name: Claude Code Warmup

on:
  schedule:
    - cron: '30 5 * * *'  # 07:30 Polish time (CEST, summer)
    - cron: '30 6 * * *'  # 07:30 Polish time (CET, winter)
  workflow_dispatch: {}

concurrency:
  group: claude-warmup-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  warmup:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    strategy:
      fail-fast: false
      matrix:
        account:
          - name: acc1
            token_secret: CLAUDE_OAUTH_TOKEN
          - name: acc2
            token_secret: CLAUDE_OAUTH_TOKEN_2
    name: warmup-${{ matrix.account.name }}
    steps:
      - name: Validate configuration
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets[matrix.account.token_secret] }}
        run: |
          if [ -z "${CLAUDE_CODE_OAUTH_TOKEN}" ]; then
            echo "Secret ${{ matrix.account.token_secret }} is not set."
            echo "Add it in Settings > Secrets and variables > Actions."
            exit 1
          fi

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Ping Claude to anchor 5-hour window
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets[matrix.account.token_secret] }}
        run: |
          mkdir -p ~/.claude
          echo '{"hasCompletedOnboarding":true}' > ~/.claude.json
          output_file="$(mktemp)"
          set +e
          claude -p "hi" --model haiku --no-session-persistence >"$output_file" 2>&1
          status=$?
          set -e
          cat "$output_file"

          if [ $status -eq 0 ]; then
            echo "Claude warmup request succeeded for ${{ matrix.account.name }}."
            echo "✓ Warmup complete"
            exit 0
          fi

          if grep -Eiq "expired|unauthorized|invalid token|authentication|auth failed|login required|not logged in" "$output_file"; then
            echo "Claude token appears invalid or expired for ${{ matrix.account.name }}."
            echo "Run 'claude setup-token' locally and update the ${{ matrix.account.token_secret }} GitHub secret."
            exit 1
          fi

          if grep -qi "rate limit" "$output_file"; then
            echo "Claude reported a rate limit; treating as warmup success."
            echo "✓ Warmup complete"
            exit 0
          fi

          echo "Claude warmup failed with an unexpected error."
          exit $status
